name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore OrganizationImportTool.sln

      - name: Build (Release)
        run: dotnet build OrganizationImportTool.sln -c Release --no-restore --nologo

      - name: Unit tests
        run: dotnet test OrganizationImportTool.Tests/OrganizationImportTool.Tests.csproj -c Release --no-build --nologo --logger "trx;LogFileName=test-results.trx"

      - name: Headless self-tests
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Recurse -Path OrganizationImportTool/bin/Release -Filter CargoSync.exe | Select-Object -First 1 -ExpandProperty FullName
          if (-not $exe) { throw "CargoSync.exe not found" }
          $tests = '--ruletest','--deduptest','--cleantest','--profiletest','--synctest'
          foreach ($t in $tests) {
            Write-Host "== $t =="
            & $exe $t
            if ($LASTEXITCODE -ne 0) { throw "Self-test $t failed with exit code $LASTEXITCODE" }
          }

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/test-results.trx'
          if-no-files-found: ignore
